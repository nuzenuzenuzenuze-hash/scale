services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scale-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - scale-network

networks:
  scale-network:
    driver: bridge
